<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shiv Login</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial;
  background: linear-gradient(135deg,#1a0000,#660000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* 🔥 Main container */
.container {
  width: 90%;
  max-width: 900px;
  text-align: center;
}

/* 🔴 Welcome text (ALWAYS visible) */
.top-text {
  margin-bottom: 15px;
}

.top-text h1 {
  color: #ff4d4d;
  font-size: 28px;
}

.top-text p {
  color: #ccc;
  font-size: 14px;
}

/* 🔴 Login box */
.login-box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  width: 100%;
  max-width: 320px;
  margin: auto;
  box-shadow: 0 0 20px red;
}

/* 🔴 Inputs */
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

/* 🔴 Button */
button {
  width: 100%;
  padding: 10px;
  background: red;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

/* ❌ Error */
.error {
  color: #ff4d4d;
  font-size: 14px;
  display: none;
}

/* 👁 Password */
.password-box {
  position: relative;
}

.eye {
  position: absolute;
  right: 12px;
  top: 12px;
  cursor: pointer;
}

/* 🔗 Social FIX */
.social {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
}

.social img {
  width: 28px !important;
  height: 28px !important;
  min-width: 28px;
  max-width: 28px;
}

/* 🔗 Sign up link */
.link {
  margin-top: 12px;
  font-size: 14px;
}

.link a {
  color: #ff4d4d;
  text-decoration: none;
}

.link a:hover {
  text-decoration: underline;
}

/* 🔴 Desktop improvement */
@media (min-width: 768px) {
  .top-text h1 {
    font-size: 32px;
  }

  .login-box {
    padding: 30px;
  }
}

</style>
</head>

<body>

<div class="container">

  <!-- 🔴 Always visible -->
  <div class="top-text">
    <h1>Welcome Back 👋</h1>
    <p>Login to continue<br>Secure • Fast • Reliable</p>
  </div>

  <!-- 🔴 Login -->
  <div class="login-box">

    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">

    <div class="password-box">
      <input type="password" id="password" placeholder="Password">
      <span class="eye" onclick="togglePassword()">👁</span>
    </div>

    <div class="error" id="error">❌ Wrong Username or Password</div>

    <button onclick="login()">Login</button>

    <!-- 🔗 Social -->
    <div class="social">
      <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
      <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
      <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
    </div>

    <!-- 🔗 FIXED (now everywhere) -->
    <div class="link">
      Don’t have account? <a href="signup.html">Sign Up</a>
    </div>

  </div>

</div>

<script>

function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;
  let error = document.getElementById("error");

  if(user === "admin" && pass === "1234") {
    alert("Login Successful 🔥");
  } else {
    error.style.display = "block";
  }
}

</script>

</body>
</html>
