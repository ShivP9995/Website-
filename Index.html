<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shiv Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1a0000, #660000);
  color: white;
}

/* 🔥 Responsive Layout */
.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

/* Desktop view */
@media (min-width: 768px) {
  .container {
    flex-direction: row;
  }
}

/* LEFT */
.left {
  text-align: center;
  padding: 20px;
}

.left h1 {
  color: #ff4d4d;
}

.left p {
  color: #ccc;
}

/* RIGHT */
.login-box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  width: 280px;
  text-align: center;
  box-shadow: 0 0 20px red;
  backdrop-filter: blur(10px);
}

/* Inputs */
input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* Button */
button {
  width: 100%;
  padding: 10px;
  background: red;
  border: none;
  border-radius: 8px;
  color: white;
}

/* Social */
.social img {
  width: 28px;
  margin: 8px;
}

/* Animation */
.circle {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,0,0,0.2);
  animation: float 10s infinite;
}

.circle:nth-child(1){width:60px;height:60px;left:10%;}
.circle:nth-child(2){width:100px;height:100px;left:70%;}
.circle:nth-child(3){width:40px;height:40px;left:40%;}

@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

  <div class="left">
    <h1>Welcome Back 👋</h1>
    <p>Login to continue<br>Secure • Fast • Reliable</p>
  </div>

  <div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <div class="social">
      <a href="https://instagram.com"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
      <a href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
      <a href="https://github.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
    </div>
  </div>

</div>

</body>
</html>
