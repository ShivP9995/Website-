<!DOCTYPE html>
<html>
<head>
  <title>Animated Red Login</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #1a0000, #660000);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 🔴 Floating circles animation */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 0, 0, 0.2);
      animation: float 10s infinite;
    }

    .circle:nth-child(1) {
      width: 80px;
      height: 80px;
      left: 10%;
      animation-duration: 12s;
    }

    .circle:nth-child(2) {
      width: 120px;
      height: 120px;
      left: 70%;
      animation-duration: 15s;
    }

    .circle:nth-child(3) {
      width: 60px;
      height: 60px;
      left: 40%;
      animation-duration: 10s;
    }

    @keyframes float {
      0% { transform: translateY(100vh); }
      100% { transform: translateY(-100vh); }
    }

    /* Login Box */
    .login-box {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 30px;
      width: 320px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
      z-index: 2;
    }

    h2 {
      color: #ff4d4d;
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #ff1a1a;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #cc0000;
      box-shadow: 0 0 10px red;
    }
  </style>
</head>

<body>

<!-- 🔴 Animated circles -->
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<!-- Login Box -->
<div class="login-box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
  function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
      alert("Welcome 🔥");
    } else {
      alert("Invalid Login ❌");
    }
  }
</script>

</body>
</html>
