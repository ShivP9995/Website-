<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: Arial;
  background: linear-gradient(135deg,#1a0000,#660000);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Box */
.login-box {
  background: rgba(255,255,255,0.05);
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:320px;
  text-align:center;
  box-shadow:0 0 20px red;
}

/* Inputs */
input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

/* Button */
button {
  width:100%;
  padding:10px;
  background:red;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* Social FIX PERFECT */
.social {
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:10px;
}

.social img {
  width:28px !important;
  height:28px !important;
  min-width:28px;
  min-height:28px;
  max-width:28px;
  max-height:28px;
  object-fit:contain;
}

/* link */
.link {
  margin-top:10px;
  font-size:14px;
}

.link a {
  color:#ff4d4d;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Login</h2>

  <input placeholder="Username">
  <input type="password" placeholder="Password">

  <button>Login</button>

  <!-- Social -->
  <div class="social">
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
  </div>

  <!-- Go to signup -->
  <div class="link">
    Don’t have account? <a href="signup.html">Sign Up</a>
  </div>

</div>

</body>
</html>
