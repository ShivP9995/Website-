<!DOCTYPE html>
<html>
<head>
  <title>Pro Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      background: linear-gradient(135deg, #1a0000, #660000);
      color: white;
    }

    .container {
      display: flex;
      width: 100%;
    }

    /* Left Side Text */
    .left {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      font-size: 24px;
    }

    /* Right Login Box */
    .right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px red;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    /* Social icons */
    .social {
      margin-top: 15px;
    }

    .social img {
      width: 30px;
      margin: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .social img:hover {
      transform: scale(1.2);
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Left Side -->
  <div class="left">
    <div>
      <h1>Welcome Back 👋</h1>
      <p>Login to continue<br>Secure • Fast • Reliable</p>
    </div>
  </div>

  <!-- Right Side -->
  <div class="right">
    <div class="login-box">
      <h2>Login</h2>
      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">
      <button>Login</button>

      <!-- Social Links -->
      <div class="social">
        <a href="https://instagram.com" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
        </a>
        <a href="https://facebook.com" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>
        <a href="https://github.com" target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/733/733553.png">
        </a>
      </div>

    </div>
  </div>

</div>

</body>
</html>  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
  function login() {
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234") {
      alert("Welcome 🔥");
    } else {
      alert("Invalid Login ❌");
    }
  }
</script>

</body>
</html>
