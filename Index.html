<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1a0000, #660000);
  color: white;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

.left {
  text-align: center;
}

.login-box {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 15px;
  width: 280px;
  text-align: center;
  box-shadow: 0 0 20px red;
  backdrop-filter: blur(10px);
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: red;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.error {
  color: #ff4d4d;
  font-size: 14px;
  display: none;
}

/* 👁 eye button */
.password-box {
  position: relative;
}

.eye {
  position: absolute;
  right: 20px;
  top: 14px;
  cursor: pointer;
}

/* animation */
.circle {
  position: fixed;
  border-radius: 50%;
  background: rgba(255,0,0,0.2);
  animation: float 10s infinite;
}

.circle:nth-child(1){width:60px;height:60px;left:10%;}
.circle:nth-child(2){width:100px;height:100px;left:70%;}
.circle:nth-child(3){width:40px;height:40px;left:40%;}

@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

  <div class="left">
    <h1>Welcome Back 👋</h1>
    <p>Login to continue<br>Secure • Fast • Reliable</p>
  </div>

  <div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">

    <div class="password-box">
      <input type="password" id="password" placeholder="Password">
      <span class="eye" onclick="togglePassword()">👁</span>
    </div>

    <div class="error" id="error">❌ Please fill all fields</div>

    <button onclick="login()">Login</button>

    <div class="social">
      <a href="https://instagram.com"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
      <a href="https://facebook.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
      <a href="https://github.com"><img src="https://cdn-icons-png.flaticon.com/512/733/733553.png"></a>
    </div>

  </div>

</div>

<script>

// 👁 Show/Hide Password
function togglePassword() {
  let pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}

// 🔐 Login validation
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;
  let error = document.getElementById("error");

  if(user === "" || pass === "") {
    error.style.display = "block";
    return;
  }

  if(user === "admin" && pass === "1234") {
    alert("Login Successful 🔥");
  } else {
    error.innerText = "❌ Wrong Username or Password";
    error.style.display = "block";
  }
}

</script>

</body>
</html>
